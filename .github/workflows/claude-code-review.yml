name: Claude PR Review

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.issue.number }}

            You are reviewing a HIGH-FREQUENCY TRADING system (Go backend + React frontend).
            Performance on the hot path is the #1 priority.

            Review this PR focusing on:

            ## HFT-Specific (CRITICAL)
            - No blocking channel sends on hot path (must use select/default)
            - No sync.Mutex on read paths (use atomic operations)
            - No heap allocations in per-tick code paths
            - No logging in tick-processing loops
            - O(1) algorithms only on tick path

            ## Auth Safety
            - MT5_BUILD must stay 5400 — flag any changes to auth constants
            - Tag88/Tag134 XOR constants must not change

            ## General
            - Code quality and Go best practices
            - Potential bugs or race conditions
            - Security (no secrets in code)
            - Test coverage for non-trivial functions

            Post a top-level PR comment summarizing findings.
            Use inline comments (with \`confirmed: true\`) for specific code issues.
