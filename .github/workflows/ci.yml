name: CI

on:
  push:
    branches: [main, 'feat/**', 'chore/**']
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint & Format
        run: pnpm check

      - name: Type Check
        run: pnpm check:types

      - name: Tests
        run: pnpm test
